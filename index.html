<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Mini App</title>
    <!-- Le script officiel Telegram pour interagir avec l'application -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Bienvenue dans ma Mini App !</h1>
    <p>Elle est connectée à Telegram.</p>
    <button onclick="fermerApp()">Fermer l'app</button>

    <script>
        // Initialise l'application Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Ouvre l'application en grand écran

        function fermerApp() {
            tg.close();
        }
    </script>
</body>
</html>
